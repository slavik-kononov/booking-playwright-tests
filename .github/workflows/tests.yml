name: Automated Tests

on:
  workflow_dispatch:
    inputs:
      test_suite:
        description: "Choose test suite to run"
        required: true
        default: "playwright"
        type: choice
        options:
          - playwright
          - postman
          - all

jobs:
  playwright:
    name: Run Playwright booking tests
    if: ${{ inputs.test_suite == 'playwright' || inputs.test_suite == 'all' }}
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 30

  postman:
    name: Run Postman API tests
    if: ${{ inputs.test_suite == 'postman' || inputs.test_suite == 'all' }}
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Newman
        run: npm install -g newman

      - name: Run Postman collection
        run: |
          mkdir -p newman
          newman run postman/API_automation.postman_collection.json \
            --reporters cli,junit \
            --reporter-junit-export newman/postman-results.xml

      - name: Upload Newman report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: postman-newman-report-${{ github.run_number }}
          path: newman/
          retention-days: 30